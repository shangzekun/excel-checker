<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel-checker 数据检查平台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #d9e2f2;
      --text: #1f2a37;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --warning: #d97706;
      --info: #0891b2;
      --success: #059669;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .upload-box {
      border: 2px dashed #bcd0f7;
      border-radius: 14px;
      padding: 20px;
      background: #f8fbff;
      display: grid;
      gap: 12px;
    }

    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-secondary:hover {
      background: #e0e7ff;
    }

    .btn-ghost {
      background: #f3f4f6;
      color: #374151;
    }

    .btn-ghost:hover {
      background: #e5e7eb;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .file-name,
    .status-line,
    .hint,
    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .rules-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .rule-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fcfdff;
    }

    .rule-top {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .rule-meta {
      display: grid;
      gap: 4px;
      flex: 1;
    }

    .rule-name {
      font-weight: 600;
    }

    .rule-desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .rule-badge {
      display: inline-block;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      color: white;
      width: fit-content;
    }

    .badge-error {
      background: var(--danger);
    }

    .badge-warning {
      background: var(--warning);
    }

    .badge-info {
      background: var(--info);
    }

    .ebom-box {
      display: none;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fafcff;
    }

    .summary-item .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-item .value {
      font-size: 28px;
      font-weight: 700;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
    }

    .filter-chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: white;
      cursor: pointer;
      font-size: 13px;
    }

    .filter-chip.active {
      background: #dbeafe;
      border-color: #93c5fd;
      color: #1d4ed8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      background: white;
      border-radius: 12px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #eef2f7;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: #475569;
    }

    .level-tag {
      display: inline-block;
      min-width: 58px;
      text-align: center;
      color: white;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      text-transform: uppercase;
    }

    .level-error {
      background: var(--danger);
    }

    .level-warning {
      background: var(--warning);
    }

    .level-info {
      background: var(--info);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .section-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fcfdff;
    }

    details {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fcfdff;
    }

    details + details {
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
    }

    ul {
      margin: 10px 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Excel-checker 数据检查平台</h1>
      <p>上传产品数据 Excel 文件，按规则执行检查；勾选“数据成熟度检查”时，可选上传对应产品 EBOM 清单参与扩展校验。</p>
    </div>

    <div class="layout">
      <div class="left">
        <div class="card">
          <h2>上传区</h2>

          <div class="upload-box">
            <div class="upload-row">
              <label class="btn btn-secondary" for="main-file-input">选择主 Excel 文件</label>
              <input id="main-file-input" type="file" accept=".xlsx" hidden />
              <span id="main-file-name" class="file-name">尚未选择文件</span>
            </div>

            <div class="muted">支持 .xlsx 文件。主文件为必传。</div>

            <div id="ebom-upload-section" class="ebom-box">
              <div class="upload-row">
                <label class="btn btn-secondary" for="ebom-file-input">选择对应产品 EBOM 清单</label>
                <input id="ebom-file-input" type="file" accept=".xlsx" hidden />
                <span id="ebom-file-name" class="file-name">未上传 EBOM 清单</span>
              </div>
              <div class="hint">仅当勾选“数据成熟度检查”时显示。这个文件是可选的，不上传也可以执行检查。</div>
            </div>

            <div>
              <div style="font-weight: 600; margin-bottom: 8px;">勾选本次执行的检查规则</div>
              <div id="rules-list" class="rules-list">
                <div class="muted">加载规则中…</div>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="check-btn" class="btn btn-primary">执行检查</button>
            <button id="clear-btn" class="btn btn-ghost">清除结果</button>
            <button id="report-btn" class="btn btn-secondary">导出报告</button>
          </div>

          <div id="status-line" class="status-line" style="margin-top: 14px;">等待上传</div>
        </div>

        <div class="card" style="margin-top: 20px;">
          <div class="section-title-row">
            <h2 style="margin: 0;">详细结果表格</h2>
          </div>

          <div class="filter-bar">
            <button class="filter-chip active" data-filter="all">全部</button>
            <button class="filter-chip" data-filter="error">Error</button>
            <button class="filter-chip" data-filter="warning">Warning</button>
            <button class="filter-chip" data-filter="info">Info</button>
          </div>

          <div id="results-container" class="empty">当前暂无检查结果</div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <h2>规则说明区</h2>
          <div id="rules-explanation">
            <div class="muted">规则说明加载中…</div>
          </div>
        </div>

        <div class="card" style="margin-top: 20px;">
          <h2>检查概览</h2>
          <div class="summary-grid">
            <div class="summary-item">
              <div class="label">总检查数</div>
              <div class="value" id="total-count">0</div>
            </div>
            <div class="summary-item">
              <div class="label">错误数</div>
              <div class="value" id="error-count">0</div>
            </div>
            <div class="summary-item">
              <div class="label">警告数</div>
              <div class="value" id="warning-count">0</div>
            </div>
            <div class="summary-item">
              <div class="label">信息数</div>
              <div class="value" id="info-count">0</div>
            </div>
          </div>
          <div id="run-summary" class="hint" style="margin-top: 14px;">尚未执行检查</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      rules: [],
      issues: [],
      currentFilter: "all",
      lastSummary: null,
    };

    const mainFileInput = document.getElementById("main-file-input");
    const ebomFileInput = document.getElementById("ebom-file-input");
    const mainFileName = document.getElementById("main-file-name");
    const ebomFileName = document.getElementById("ebom-file-name");
    const ebomUploadSection = document.getElementById("ebom-upload-section");
    const rulesList = document.getElementById("rules-list");
    const rulesExplanation = document.getElementById("rules-explanation");
    const statusLine = document.getElementById("status-line");
    const resultsContainer = document.getElementById("results-container");
    const runSummary = document.getElementById("run-summary");

    mainFileInput.addEventListener("change", () => {
      const file = mainFileInput.files[0];
      mainFileName.textContent = file ? file.name : "尚未选择文件";
    });

    ebomFileInput.addEventListener("change", () => {
      const file = ebomFileInput.files[0];
      ebomFileName.textContent = file ? file.name : "未上传 EBOM 清单";
    });

    document.getElementById("check-btn").addEventListener("click", onCheck);
    document.getElementById("report-btn").addEventListener("click", onExportReport);
    document.getElementById("clear-btn").addEventListener("click", clearResults);

    document.querySelectorAll(".filter-chip").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-chip").forEach((x) => x.classList.remove("active"));
        btn.classList.add("active");
        state.currentFilter = btn.dataset.filter;
        renderResults();
      });
    });

    async function loadRules() {
      statusLine.textContent = "正在加载规则…";
      try {
        const resp = await fetch("/api/rules");
        if (!resp.ok) {
          throw new Error("规则加载失败");
        }
        const data = await resp.json();
        state.rules = data.rules || [];
        renderRules();
        renderRuleDetails();
        statusLine.textContent = "规则已加载，请选择文件并勾选规则。";
      } catch (err) {
        rulesList.innerHTML = `<div class="empty">规则加载失败：${escapeHtml(err.message)}</div>`;
        rulesExplanation.innerHTML = `<div class="empty">无法加载规则说明</div>`;
        statusLine.textContent = "规则加载失败";
      }
    }

    function renderRules() {
      if (!state.rules.length) {
        rulesList.innerHTML = `<div class="empty">暂无规则</div>`;
        return;
      }

      rulesList.innerHTML = state.rules.map((rule) => {
        const checked = rule.enabled ? "checked" : "";
        return `
          <label class="rule-item">
            <div class="rule-top">
              <input
                type="checkbox"
                name="rule"
                value="${escapeHtml(rule.id)}"
                ${checked}
              />
              <div class="rule-meta">
                <div class="rule-name">${escapeHtml(rule.name)}</div>
                <div class="rule-badge badge-${escapeHtml(rule.level)}">${escapeHtml(rule.level)}</div>
                <div class="rule-desc">${escapeHtml(rule.description)}</div>
              </div>
            </div>
          </label>
        `;
      }).join("");

      document.querySelectorAll('input[name="rule"]').forEach((checkbox) => {
        checkbox.addEventListener("change", toggleEbomUpload);
      });

      toggleEbomUpload();
    }

    function renderRuleDetails() {
      if (!state.rules.length) {
        rulesExplanation.innerHTML = `<div class="empty">暂无规则说明</div>`;
        return;
      }

      rulesExplanation.innerHTML = state.rules.map((rule) => `
        <details ${rule.id === "data_maturity_check" ? "open" : ""}>
          <summary>${escapeHtml(rule.name)}</summary>
          <div class="hint" style="margin-top: 8px;">${escapeHtml(rule.description)}</div>
          <ul>
            ${(rule.details || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </details>
      `).join("");
    }

    function toggleEbomUpload() {
      const selectedRuleIds = getSelectedRuleIds();
      const needEbomSection = selectedRuleIds.includes("data_maturity_check");

      ebomUploadSection.style.display = needEbomSection ? "block" : "none";

      if (!needEbomSection) {
        ebomFileInput.value = "";
        ebomFileName.textContent = "未上传 EBOM 清单";
      }
    }

    function getSelectedRuleIds() {
      return Array.from(document.querySelectorAll('input[name="rule"]:checked')).map((el) => el.value);
    }

    function buildFormData() {
      const mainFile = mainFileInput.files[0];
      if (!mainFile) {
        throw new Error("请先选择主 Excel 文件");
      }

      const selectedRules = getSelectedRuleIds();
      if (!selectedRules.length) {
        throw new Error("请至少勾选一条检查规则");
      }

      const formData = new FormData();
      formData.append("file", mainFile);
      formData.append("selected_rules", selectedRules.join(","));

      const ebomFile = ebomFileInput.files[0];
      if (ebomFile) {
        formData.append("ebom_file", ebomFile);
      }

      return formData;
    }

    async function onCheck() {
      try {
        const formData = buildFormData();
        statusLine.textContent = "正在执行检查…";

        const resp = await fetch("/api/check", {
          method: "POST",
          body: formData,
        });

        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || "检查失败");
        }

        state.issues = data.issues || [];
        state.lastSummary = data.summary || null;
        updateSummary(data.summary || {});
        renderResults();

        statusLine.textContent = `检查完成，共返回 ${state.issues.length} 条结果。`;
      } catch (err) {
        statusLine.textContent = `执行失败：${err.message}`;
      }
    }

    async function onExportReport() {
      try {
        const formData = buildFormData();
        statusLine.textContent = "正在生成报告…";

        const resp = await fetch("/api/report", {
          method: "POST",
          body: formData,
        });

        if (!resp.ok) {
          let detail = "导出报告失败";
          try {
            const data = await resp.json();
            detail = data.detail || detail;
          } catch (_) {}
          throw new Error(detail);
        }

        const blob = await resp.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "check_report.xlsx";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        statusLine.textContent = "报告已导出。";
      } catch (err) {
        statusLine.textContent = `导出失败：${err.message}`;
      }
    }

    function updateSummary(summary) {
      document.getElementById("total-count").textContent = summary.total ?? 0;
      document.getElementById("error-count").textContent = summary.errors ?? 0;
      document.getElementById("warning-count").textContent = summary.warnings ?? 0;
      document.getElementById("info-count").textContent = summary.infos ?? 0;

      const selectedRules = Array.isArray(summary.selected_rules)
        ? summary.selected_rules.join(", ")
        : (summary.selected_rules || "");

      runSummary.textContent = [
        `文件：${summary.filename || "-"}`,
        `规则：${selectedRules || "-"}`,
        `是否上传 EBOM：${summary.has_ebom ? "是" : "否"}`,
        summary.ebom_filename ? `EBOM：${summary.ebom_filename}` : null,
        summary.duration_ms != null ? `耗时：${summary.duration_ms}ms` : null,
      ].filter(Boolean).join(" | ");
    }

    function renderResults() {
      let rows = state.issues;

      if (state.currentFilter !== "all") {
        rows = rows.filter((item) => item.level === state.currentFilter);
      }

      if (!rows.length) {
        resultsContainer.innerHTML = `<div class="empty">当前筛选条件下暂无结果</div>`;
        return;
      }

      resultsContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>规则</th>
              <th>级别</th>
              <th>Sheet</th>
              <th>行号</th>
              <th>列名</th>
              <th>问题描述</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((item) => `
              <tr>
                <td>${escapeHtml(item.rule || "-")}</td>
                <td><span class="level-tag level-${escapeHtml(item.level)}">${escapeHtml(item.level)}</span></td>
                <td>${escapeHtml(item.sheet || "-")}</td>
                <td>${item.row ?? "-"}</td>
                <td>${escapeHtml(item.column || "-")}</td>
                <td>${escapeHtml(item.message || "-")}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function clearResults() {
      state.issues = [];
      state.lastSummary = null;
      document.getElementById("total-count").textContent = "0";
      document.getElementById("error-count").textContent = "0";
      document.getElementById("warning-count").textContent = "0";
      document.getElementById("info-count").textContent = "0";
      runSummary.textContent = "尚未执行检查";
      resultsContainer.innerHTML = `<div class="empty">当前暂无检查结果</div>`;
      statusLine.textContent = "结果已清除";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    loadRules();
  </script>
</body>
</html>
